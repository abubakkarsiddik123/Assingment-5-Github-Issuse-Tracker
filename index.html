<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub-Issue-tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <!-- tailwind and daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center">
    <main class="max-w-lg bg-white mx-auto shadow-md rounded-lg  p-8">
      <div class="items-center text-center mb-4">
        <img class="mx-auto mb-6" src="./assets/github-logo.png" alt="" />
        <h1 class="text-2xl font-semibold text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] mt-1">Sign in to manage your issues</p>
      </div>

      <!-- forms -->
      <div class="flex-col lg:flex-row-reverse space-y-2">
        <label class="label text-[#1F2937] font-medium">Username</label>
        <input 
        id="input-name"
          type="text"
          class="input text-[#64748B] w-full"
          placeholder="Enter Username"
        />
        <label class="label text-[#1F2937] font-medium">Password</label> <br />
        <input
        id="input-password"
          type="password"
          class="input text-[#64748B] w-full"
          placeholder="Enter Password"
        />
        <button id="input-btn" class="btn btn-primary mt-4 w-full">Sign In</button>
      </div>


      <!-- or divider -->
      <div class="divider">OR</div>
      <p class="text-[#64748B] mb-8 text-center">Demo Credentials:</p>

      <div class="text-center">
         <p class="text-[#64748B]"><span class="text-[#1F2937] font-semibold">Username:</span>admin</p>
        <p class="text-[#64748B]"><span class="text-[#1F2937] font-semibold">Password:</span>admin123</p>
      </div>
    </main>
    <script src="./script/login.js"></script>
  </body>
</html>
